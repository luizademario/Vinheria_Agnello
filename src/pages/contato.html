<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contato Vinharia Agnello</title>

    <meta name="description" content="Vinharia Agnello - Vinhos selecionados com qualidade e tradição.">

    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    
<!-- Formulário com input, textarea e botão -->


<header class="header">
    <h1>Vinheria Agnelo </h1>   
        <nav class="nav">
            <ul class="menu">
                <li><a href="../../index.html">Início</a></li>
                <li><a href="historia.html">História</a></li>
                <li><a href="produtos.html">Produtos</a></li>
                <li><a href="harmonizacao.html">Harmonização</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
        </nav>

</header>

<main>

    <section class="contato">
        <h2>Fale Conosco</h2>
        <p>Preencha o formulário abaixo e entraremos em contato com você.</p>

         <img src="../assets/imgs/recepcao.png">

        <form action="#" method="post" class="form-contato">

            <div class="campo">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" required>
            </div>

            <div class="campo">
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="campo">
                <label for="mensagem">Mensagem:</label>
                <textarea id="mensagem" name="mensagem" rows="5" required></textarea>
            </div>

            <button type="submit">Enviar</button>

        </form>
    </section>

</main>
    <footer class="footer">
        <p>Vinharia Casa Agnello &copy; 2026</p>
    </footer>

</body>
</html>
